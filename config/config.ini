[Settings]
# =========================
# 全局功能开关
# =========================
open_update = True
open_unmatch_category = True
open_empty_category = False
open_update_time = True
open_url_info = False
open_epg = True
open_m3u_result = True
urls_limit = 5
update_time_position = top
language = zh_CN

# =========================
# 定时执行设置
# =========================
update_mode = interval
update_interval = 12
update_times =
update_startup = True
time_zone = Asia/Shanghai

# =========================
# 结果输出 & 服务配置
# =========================
source_file = config/user_demo.txt
final_file = output/user_result.txt
open_realtime_write = True
open_service = True
app_port = 5180
public_scheme = http
public_domain = 127.0.0.1
cdn_url = 
http_proxy =

# =========================
# 数据源总开关
# =========================
open_local = True
open_subscribe = True
open_auto_disable_source = True

# =========================
# 数据源工作模式
# =========================
open_history = True
open_headers = False

# =========================
# 过滤 & 测速设置
# =========================
open_speed_test = True
open_filter_resolution = True
open_filter_speed = True
open_full_speed_test = False
open_supply = False
min_resolution = 1280x720
max_resolution = 3840x2160
min_speed = 0.5
resolution_speed_map = 1280x720:0.2,1920x1080:0.5,3840x2160:1.0
speed_test_limit = 5
speed_test_timeout = 20
speed_test_filter_host = False
request_timeout = 10

# =========================
# 网络协议 & 地域偏好
# =========================
ipv6_support = True
ipv_type = all
ipv_type_prefer = auto
location =
isp =

# =========================
# 结果排序偏好
# =========================
origin_type_prefer =

# =========================
# 本地源 & 订阅源
# =========================
local_num = 10
subscribe_num = 10

# =========================
# 频道台标
# =========================
logo_url = https://www.xn--rgv465a.top/tvlogo
logo_type = png

# =========================
# RTMP 推流
# =========================
open_rtmp = True
nginx_http_port = 8080
nginx_rtmp_port = 1935
rtmp_idle_timeout = 300
rtmp_max_streams = 10
rtmp_transcode_mode = copy

# =========================
# 额外功能增强
# =========================
open_sort = True
