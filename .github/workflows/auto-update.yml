name: 🤖 Auto Update IPTV Sources

on:
  schedule:
    # 每12小时运行一次 (UTC 0:00 和 12:00)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pipenv
      
      - name: Install project dependencies
        run: |
          pipenv install --dev
      
      - name: Run update
        run: |
          pipenv run dev
        timeout-minutes: 60
      
      - name: Commit and push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Auto update IPTV sources - $(date +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
      
      - name: Upload results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iptv-update-result
          path: output/
          retention-days: 7
      
      - name: Show update logs
        if: always()
        run: |
          if [ -f output/log/result.log ]; then
            echo "=== Update Result Log ==="
            tail -50 output/log/result.log
          fi
          if [ -f output/log/statistic.log ]; then
            echo "=== Statistics ==="
            tail -20 output/log/statistic.log
          fi
